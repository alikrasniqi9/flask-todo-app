{% extends 'base.html' %}
{% block title %} Edit Page {% endblock %}

{% block content %}
    <div class="content">
        <h1>Edit your task</h1>
        <form action="/update/{{task.id}}" method="POST">
            <input type="text" name="content" id="content" value="{{task.content}}">
            <input type="submit" value="Edit">
        </form>
    </div>
{% endblock %}
